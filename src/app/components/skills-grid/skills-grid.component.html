<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
  @for (category of categories; track category.title) {
    <div class="bg-dark-card border border-dark-border/40 rounded-xl p-6 hover:border-primary/20 transition-all duration-300 shadow-lg">
      <!-- Título da Categoria -->
      <h4 class="text-base font-semibold font-outfit text-foreground tracking-wide border-b border-dark-border/40 pb-3 mb-5 flex items-center gap-2">
        <span class="w-1.5 h-4 rounded bg-primary"></span>
        {{ category.title }}
      </h4>

      <!-- Lista de Habilidades -->
      <div class="grid grid-cols-2 gap-4">
        @for (skill of category.skills; track skill.name) {
          <div class="flex items-center gap-3 p-3 rounded-lg bg-dark-bg/40 border border-dark-border/30 hover:border-primary/30 hover:bg-dark-bg/80 transition-all duration-300 group">
            <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-dark-card border border-dark-border text-muted group-hover:text-primary group-hover:border-primary/50 transition-colors duration-300">
              <i [class]="skill.icon + ' text-base'"></i>
            </div>
            <div>
              <p class="text-xs font-semibold text-foreground group-hover:text-primary transition-colors duration-300">
                {{ skill.name }}
              </p>
              @if (skill.level) {
                <span class="text-[10px] text-muted">{{ skill.level }}</span>
              }
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
